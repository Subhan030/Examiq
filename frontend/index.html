<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="background:red;color:white;padding:20px;z-index:9999;position:absolute;top:0;left:0;width:100%;"><h2 style="margin:0;">React Runtime Crash</h2><pre>' + e.message + '\\n' + e.filename + ':' + e.lineno + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="background:orange;color:white;padding:20px;z-index:9999;position:absolute;top:0;left:0;width:100%;"><h2 style="margin:0;">Promise Rejection Crash</h2><pre>' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
